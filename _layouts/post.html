---
layout: default
---

<header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-date">{% if page.collection == "ledger" %}记于{% else %}发布于{% endif %} {{ page.date | date: "%Y年%m月%d日" }}</p>
</header>

<article class="post-content">
    {{ content }}
</article>

<div class="post-footer">
    {% if page.collection == "ledger" %}
        <a href="{{ '/ledger.html' | relative_url }}" class="btn">返回流水账</a>
    {% else %}
        <a href="{{ '/blogs.html' | relative_url }}" class="btn">返回博客列表</a>
    {% endif %}
</div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- 引入 KaTeX 用于极速公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- Brand display font -->
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@900&family=Pirata+One&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-color: #223044;
            --muted-color: #66748a;
            --accent-color: #2f78b7;
            --accent-strong: #238d83;
            --page-bg: #dfe7f0;
            --surface: #e7edf4;
            --surface-soft: #f1f5f9;
            --surface-deep: #d2dbe6;
            --shadow-dark: rgba(111, 126, 145, 0.34);
            --shadow-light: rgba(255, 255, 255, 0.78);
            --hairline: rgba(75, 96, 124, 0.13);
            --math-font: "Georgia", "Times New Roman", serif;
            --ui-font: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        * { box-sizing: border-box; }
        html { margin: 0; padding: 0; background-color: var(--page-bg); min-height: 100vh; }
        body { margin: 0; padding: 0; background-color: transparent; color: var(--text-color); font-family: var(--math-font); line-height: 1.8; overflow-x: hidden; min-height: 100vh; }
        a:focus:not(:focus-visible),
        button:focus:not(:focus-visible) { outline: none; }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.5), transparent 30%),
                radial-gradient(circle at 78% 8%, rgba(172, 219, 226, 0.24), transparent 24%),
                linear-gradient(180deg, rgba(223, 231, 240, 0.12), rgba(209, 219, 231, 0.36));
        }
        #math-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; background: radial-gradient(circle at 50% 22%, #f7fbff 0%, #dbeaf5 34%, #bed3e7 68%, #a8c2db 100%); }
        body.sea-page::before {
            background:
                radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.36), transparent 28%),
                radial-gradient(circle at 18% 72%, rgba(101, 187, 191, 0.2), transparent 26%),
                linear-gradient(180deg, rgba(234, 244, 251, 0.08), rgba(109, 151, 185, 0.2));
        }
        body.sea-page .top-nav { background: rgba(231, 237, 244, 0.52); backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); }
        .top-nav { display: flex; justify-content: space-between; align-items: center; gap: 28px; width: min(1120px, calc(100% - 32px)); margin: 18px auto 0; padding: 12px 16px 12px 22px; background: rgba(231, 237, 244, 0.78); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border: 1px solid var(--hairline); border-radius: 999px; position: sticky; top: 14px; z-index: 100; box-shadow: 14px 14px 34px var(--shadow-dark), -12px -12px 30px var(--shadow-light), inset 1px 1px 1px rgba(255,255,255,0.72), inset -1px -1px 1px rgba(97,112,132,0.18); }
        
        .nav-brand { 
    font-family: 'Pirata One', cursive; 
    
    font-size: clamp(2.1rem, 4vw, 2.8rem);
    line-height: 1;
    font-weight: 400; 
    color: #172337; 
    letter-spacing: 0;
    text-transform: capitalize;
    
    text-shadow: 
        2px 4px 8px rgba(111, 126, 145, 0.35),
        -2px -2px 8px rgba(255, 255, 255, 0.92),
        0 0 22px rgba(47, 120, 183, 0.18);
}
        
        .nav-links { display: flex; gap: 8px; transition: all 0.3s ease; }
        .nav-links a { color: var(--muted-color); text-decoration: none; padding: 8px 13px; font-size: 0.95rem; transition: all 0.24s ease; font-family: var(--ui-font); border-radius: 999px; }
        .nav-links a:hover { color: #18263a; background: var(--surface-soft); box-shadow: inset 5px 5px 10px rgba(111,126,145,0.22), inset -5px -5px 12px rgba(255,255,255,0.72); }
        .menu-toggle { display: none; cursor: pointer; width: 44px; height: 44px; flex: 0 0 auto; align-items: center; justify-content: center; gap: 4px; flex-direction: column; background: var(--surface); border: 1px solid rgba(75, 96, 124, 0.1); border-radius: 50%; box-shadow: 7px 7px 15px rgba(111,126,145,0.3), -5px -5px 14px rgba(255,255,255,0.76); }
        .menu-toggle span { display: block; width: 18px; height: 2px; border-radius: 999px; background: var(--accent-color); }
        @media (max-width: 768px) {
            .menu-toggle { display: inline-flex; }
            .nav-links { position: absolute; top: calc(100% + 12px); left: 0; width: 100%; background: rgba(231, 237, 244, 0.96); backdrop-filter: blur(16px); flex-direction: column; align-items: stretch; padding: 0; max-height: 0; overflow: hidden; border: 0; border-radius: 22px; box-shadow: 14px 14px 34px var(--shadow-dark), -10px -10px 26px var(--shadow-light); }
            .nav-links.active { max-height: 420px; padding: 12px; border: 1px solid var(--hairline); }
            .nav-links a { text-align: center; }
        }
        .paper-container { position: relative; z-index: 2; width: min(1080px, calc(100% - 32px)); margin: 42px auto 72px; padding: clamp(28px, 5vw, 54px); background: rgba(231, 237, 244, 0.56); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(75, 96, 124, 0.2); border-radius: 30px; box-shadow: 24px 24px 58px rgba(111,126,145,0.26), -18px -18px 48px rgba(255,255,255,0.54), inset 1px 1px 1px rgba(255,255,255,0.68), inset -1px -1px 2px rgba(97,112,132,0.14); animation: surfaceRise 0.8s ease both; }
        .home-shell { display: grid; gap: clamp(30px, 5vw, 48px); }
        .profile-section { display: grid; grid-template-columns: minmax(210px, 0.8fr) minmax(0, 1.2fr); align-items: center; gap: clamp(30px, 6vw, 72px); min-height: clamp(360px, calc(100svh - 340px), 520px); }
        .profile-media { position: relative; display: grid; place-items: center; min-height: 280px; }
        .profile-media::before { content: ""; position: absolute; width: min(86%, 360px); aspect-ratio: 1; border-radius: 50%; background: linear-gradient(145deg, var(--surface-soft), var(--surface-deep)); box-shadow: 24px 24px 50px var(--shadow-dark), -18px -18px 44px var(--shadow-light), inset 7px 7px 16px rgba(111,126,145,0.22), inset -7px -7px 16px rgba(255,255,255,0.72); }
        .profile-avatar { position: relative; width: clamp(180px, 25vw, 260px); height: clamp(180px, 25vw, 260px); border-radius: 50%; object-fit: cover; border: 10px solid var(--surface); box-shadow: 16px 16px 34px rgba(111,126,145,0.34), -12px -12px 30px rgba(255,255,255,0.72); flex-shrink: 0; }
        .profile-info { animation: copyIn 0.9s 0.12s ease both; }
        .home-kicker { margin: 0 0 12px; color: var(--accent-strong); font: 700 0.82rem/1.4 var(--ui-font); letter-spacing: 0; text-transform: uppercase; }
        .profile-info h1 { margin: 0 0 16px 0; border-bottom: none; font-size: clamp(2.65rem, 7vw, 5.4rem); line-height: 0.98; color: #172337; text-shadow: 5px 7px 16px rgba(111,126,145,0.22), -3px -3px 12px rgba(255,255,255,0.78); }
        .profile-info h1 span { display: block; }
        .profile-info .subtitle { max-width: 560px; margin: 0 0 28px 0; color: #4d5d72; font-size: clamp(1.05rem, 2vw, 1.25rem); font-style: normal; }
        .action-buttons { display: flex; gap: 14px; flex-wrap: wrap; }
        .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 46px; padding: 11px 22px; background: linear-gradient(145deg, #f3f7fb, #d5e0eb); color: var(--accent-color); border: 1px solid rgba(75, 96, 124, 0.12); border-radius: 999px; text-decoration: none !important; font-weight: 700; font-family: var(--ui-font); transition: transform 0.24s ease, box-shadow 0.24s ease, color 0.24s ease, background 0.24s ease; box-shadow: 12px 12px 24px rgba(105,119,138,0.34), -10px -10px 22px rgba(255,255,255,0.84), inset 1px 1px 1px rgba(255,255,255,0.82), inset -1px -1px 1px rgba(104,120,141,0.12); }
        .btn:hover { background: linear-gradient(145deg, #f8fbfe, #d9e4ee); color: #1e5f9d; box-shadow: 15px 15px 28px rgba(105,119,138,0.3), -12px -12px 26px rgba(255,255,255,0.88), inset 2px 2px 3px rgba(255,255,255,0.78), inset -2px -2px 4px rgba(104,120,141,0.12); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); box-shadow: inset 8px 8px 16px rgba(105,119,138,0.28), inset -8px -8px 18px rgba(255,255,255,0.82); }
        .nav-links a:focus-visible,
        .btn:focus-visible,
        .menu-toggle:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(47,120,183,0.16), 0 0 0 6px rgba(255,255,255,0.46), inset 4px 4px 9px rgba(111,126,145,0.18), inset -4px -4px 10px rgba(255,255,255,0.76); }
        .home-sections { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 28px; }
        .home-panel { padding: clamp(24px, 4vw, 36px); border-radius: 24px; background: linear-gradient(145deg, rgba(241,245,249,0.76), rgba(214,224,235,0.68)); border: 1px solid rgba(75, 96, 124, 0.14); box-shadow: inset 8px 8px 18px rgba(111,126,145,0.15), inset -8px -8px 18px rgba(255,255,255,0.6); }
        .home-panel h2 { margin-top: 0; }
        .contact-list { list-style: none; padding: 0; margin: 18px 0 0; font-family: var(--ui-font); }
        .contact-list li { display: flex; gap: 10px; flex-wrap: wrap; padding: 9px 0; border-top: 1px solid rgba(75, 96, 124, 0.12); }
        .contact-list strong { color: #172337; min-width: 62px; }
        .research-note { margin: 0; color: #526276; }
        .blog-page { display: grid; gap: clamp(30px, 5vw, 54px); }
        .blog-hero { text-align: center; padding: clamp(54px, 8vw, 96px) 0 clamp(18px, 4vw, 32px); }
        .blog-title { margin: 0 0 26px; border-bottom: none; color: #172337; font-size: clamp(2.4rem, 5vw, 3.35rem); line-height: 1.08; text-shadow: 5px 7px 16px rgba(111,126,145,0.18), -3px -3px 12px rgba(255,255,255,0.72); }
        .blog-quote { margin: 0; color: #506175; font-size: clamp(1.05rem, 2vw, 1.25rem); font-style: italic; }
        .blog-list { display: grid; gap: 22px; }
        .post-card-link { display: block; color: inherit; text-decoration: none; }
        .post-card { padding: clamp(24px, 4vw, 34px); background: linear-gradient(145deg, rgba(244,248,252,0.88), rgba(217,227,238,0.82)); border: 1px solid rgba(75, 96, 124, 0.18); border-radius: 18px; box-shadow: 14px 14px 30px rgba(105,119,138,0.22), -12px -12px 28px rgba(255,255,255,0.7), inset 1px 1px 1px rgba(255,255,255,0.78), inset -1px -1px 1px rgba(104,120,141,0.1); transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease, background 0.24s ease; }
        .post-card-link:hover .post-card { transform: translateY(-3px); background: linear-gradient(145deg, rgba(248,251,254,0.92), rgba(222,232,242,0.88)); border-color: rgba(47, 120, 183, 0.34); box-shadow: 18px 18px 36px rgba(105,119,138,0.24), -14px -14px 32px rgba(255,255,255,0.76), inset 1px 1px 1px rgba(255,255,255,0.82); }
        .post-meta { color: #2f78b7; font-family: var(--ui-font); font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; }
        .post-title { margin: 0 0 12px; border-bottom: none; color: #172337; font-size: clamp(1.45rem, 3vw, 1.85rem); line-height: 1.28; }
        .post-excerpt { margin: 0; color: #46586d; font-size: 1.02rem; line-height: 1.75; }
        .post-header { text-align: center; padding: clamp(36px, 6vw, 72px) 0 32px; margin-bottom: clamp(28px, 5vw, 48px); border-bottom: 1px solid rgba(75, 96, 124, 0.14); }
        .post-header h1 { margin: 0 0 14px; border-bottom: none; color: #172337; font-size: clamp(2.2rem, 5vw, 3.35rem); line-height: 1.12; text-shadow: 5px 7px 16px rgba(111,126,145,0.18), -3px -3px 12px rgba(255,255,255,0.72); }
        .post-date { margin: 0; color: #506175; font-family: var(--ui-font); font-size: 0.95rem; font-weight: 700; }
        .post-content { color: #2d3d51; font-size: clamp(1.03rem, 1.6vw, 1.12rem); line-height: 1.9; }
        .post-content h1,
        .post-content h2,
        .post-content h3 { color: #172337; }
        .post-content p,
        .post-content li { color: #2d3d51; }
        .post-footer { margin-top: 60px; text-align: center; border-top: 1px dashed rgba(75, 96, 124, 0.22); padding-top: 30px; }
        .sea-view { position: relative; z-index: 2; min-height: calc(100svh - 112px); display: grid; place-items: end start; padding: clamp(80px, 12vw, 150px) clamp(28px, 8vw, 120px); pointer-events: none; }
        .sea-mark { max-width: 520px; color: #172337; text-shadow: 0 14px 38px rgba(62,96,132,0.34), -3px -3px 18px rgba(255,255,255,0.82), 0 0 34px rgba(116,188,202,0.28); }
        .sea-mark h1 { margin: 0 0 8px; border-bottom: none; font-size: clamp(3rem, 8vw, 6.4rem); line-height: 0.95; }
        .sea-mark p { margin: 0; color: #506175; font: 700 clamp(0.9rem, 1.8vw, 1.1rem)/1.6 var(--ui-font); }
        @media (max-width: 760px) {
            .top-nav { width: min(100% - 22px, 1120px); margin-top: 12px; top: 10px; border-radius: 24px; padding-right: 12px; }
            .profile-section { grid-template-columns: 1fr; min-height: auto; text-align: center; }
            .profile-info .subtitle { max-width: 300px; margin-left: auto; margin-right: auto; font-size: 1rem; line-height: 1.75; }
            .profile-info h1 { max-width: 100%; overflow-wrap: anywhere; }
            .profile-media { min-height: 230px; }
            .action-buttons { display: grid; grid-template-columns: 1fr; justify-content: center; max-width: 240px; margin: 0 auto; }
            .btn { width: 100%; min-width: 0; padding-inline: 14px; white-space: nowrap; }
            .home-sections { grid-template-columns: 1fr; }
            .blog-hero { padding-top: 36px; }
            .post-card { border-radius: 16px; }
            .sea-view { min-height: calc(100svh - 96px); align-items: end; padding: 76px 24px 42px; }
            .paper-container { width: min(100% - 22px, 1080px); margin-top: 28px; padding: 24px 18px; border-radius: 24px; }
        }
        @media (max-width: 420px) {
            .top-nav { padding: 10px 12px 10px 16px; gap: 14px; }
            .nav-brand { font-size: 1.82rem; }
            .profile-info h1 { font-size: clamp(2.25rem, 16vw, 3.2rem); }
            .btn { width: 100%; font-size: 0.95rem; }
        }
        /* === 学术风排版标签 (全套数学区块) === */
        h1, h2, h3 { border-bottom: 1px solid rgba(75, 96, 124, 0.12); padding-bottom: 8px; }
        h2 { color: #172337; font-size: clamp(1.55rem, 3vw, 2rem); line-height: 1.25; }
        
        /* 1. 定理 (Theorem) - 主题蓝 */
        .theorem { margin: 2em 0; padding: 15px 20px; background: rgba(47, 120, 183, 0.08); border-left: 4px solid var(--accent-color); border-radius: 0 4px 4px 0; }
        .theorem::before { content: "Theorem. "; font-weight: bold; color: var(--accent-color); }
        
        /* 2. 定义 (Definition) - 极客青 (统一风格) */
        .definition { margin: 2em 0; padding: 15px 20px; background: rgba(35, 141, 131, 0.08); border-left: 4px solid #238d83; border-radius: 0 4px 4px 0; }
        .definition::before { content: "Definition. "; font-weight: bold; color: #238d83; }
        
        /* 3. 引理 (Lemma) - 薄荷绿 */
        .lemma { margin: 2em 0; padding: 15px 20px; background: rgba(69, 148, 90, 0.08); border-left: 4px solid #45945a; border-radius: 0 4px 4px 0; }
        .lemma::before { content: "Lemma. "; font-weight: bold; color: #45945a; }
        
        /* 4. 命题 (Proposition) - 柔紫 */
        .proposition { margin: 2em 0; padding: 15px 20px; background: rgba(121, 99, 177, 0.08); border-left: 4px solid #7963b1; border-radius: 0 4px 4px 0; }
        .proposition::before { content: "Proposition. "; font-weight: bold; color: #7963b1; }

        /* 5. 备用空块 (Generic Block) - 高级灰，无自动前缀，供自由发挥 */
        .math-block { margin: 2em 0; padding: 15px 20px; background: rgba(102, 116, 138, 0.08); border-left: 4px solid #66748a; border-radius: 0 4px 4px 0; }
        .block1 { margin: 2em 0; padding: 15px 20px; background: rgba(47, 120, 183, 0.08); border-left: 4px solid var(--accent-color); border-radius: 0 4px 4px 0; }
        .block2 { margin: 2em 0; padding: 15px 20px; background: rgba(35, 141, 131, 0.08); border-left: 4px solid #238d83; border-radius: 0 4px 4px 0; }
        .block3 { margin: 2em 0; padding: 15px 20px; background: rgba(69, 148, 90, 0.08); border-left: 4px solid #45945a; border-radius: 0 4px 4px 0; }
        .block4 { margin: 2em 0; padding: 15px 20px; background: rgba(121, 99, 177, 0.08); border-left: 4px solid #7963b1; border-radius: 0 4px 4px 0; }
        
        /* 6. 证明 (Proof) - 专属无背景斜体 + 证毕符号 */
        .proof { margin: 2em 0; padding: 15px 20px; font-style: italic; border-left: 2px solid rgba(75, 96, 124, 0.16); }
        .proof::before { content: "Proof. "; font-weight: bold; font-style: normal; }
        .proof::after { content: "■"; float: right; color: var(--text-color); }
        
        /* 公式防溢出与基本标签 */
        .katex-display { overflow-x: auto; overflow-y: hidden; padding: 5px 0; }
        a { color: var(--accent-color); text-decoration: none; }
        img { max-width: 100%; border-radius: 6px; }
        code { background: rgba(47,120,183,0.09); padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #225f96; }
        .box.glass { background: rgba(231, 237, 244, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(75, 96, 124, 0.12);}
        @keyframes surfaceRise {
            from { opacity: 0; transform: translateY(18px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes copyIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

    
    
    </style>
</head>
<body class="{% if page.full_bleed %}sea-page{% endif %}">

    <canvas id="math-canvas"></canvas>

    <nav class="top-nav">
        <div class="nav-brand">Principia.</div>
        <button class="menu-toggle" id="mobile-menu-btn" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="nav-links">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/cv.html' | relative_url }}">CV</a>
            <a href="{{ '/blogs.html' | relative_url }}">Blogs</a>
            <a href="{{ '/notes.html' | relative_url }}">Notes</a>
            <a href="{{ '/resources.html' | relative_url }}">Resources</a>
            <a href="{{ '/sea.html' | relative_url }}">Sea</a>
        </div>
    </nav>

    {% if page.full_bleed %}
        {{ content }}
    {% else %}
        <div class="paper-container">
            {{ content }}
        </div>
    {% endif %}

    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            const links = document.getElementById('nav-links');
            links.classList.toggle('active');
            this.setAttribute('aria-expanded', links.classList.contains('active'));
        });

        // Background grid sea and floating math symbols.
        document.addEventListener("DOMContentLoaded", function() {
            const canvas = document.getElementById('math-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            let width = 0;
            let height = 0;
            let dpr = 1;
            let time = 0;
            let symbols = [];
            const isSeaPage = document.body.classList.contains('sea-page');
            const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const mouse = { x: null, y: null, radius: isSeaPage ? 360 : 260 };
            const glyphs = ['∫', '∑', '∞', 'π', 'Δ', '∇', 'θ', 'λ', 'φ', 'Ω', '≈', 'ζ', '∂'];

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = Math.floor(width * dpr);
                canvas.height = Math.floor(height * dpr);
                canvas.style.width = `${width}px`;
                canvas.style.height = `${height}px`;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                createSymbols();
            }

            window.addEventListener('resize', resize);
            window.addEventListener('mousemove', (event) => {
                mouse.x = event.clientX;
                mouse.y = event.clientY;
            });
            window.addEventListener('mouseout', () => {
                mouse.x = null;
                mouse.y = null;
            });

            function project(x, depth, lift = 0) {
                const horizon = height * (isSeaPage ? 0.28 : 0.34);
                const span = height * (isSeaPage ? 0.9 : 0.82);
                const perspective = Math.pow(depth, 1.78);
                const centerPull = 1 - depth * 0.58;
                const sway = Math.sin(time * 0.42 + depth * 8.0) * 18 * depth;
                return {
                    x: width / 2 + (x - width / 2) * centerPull + sway,
                    y: horizon + perspective * span - lift
                };
            }

            function wave(x, depth, phase = 0) {
                const scale = isSeaPage ? 1.18 : 0.82;
                const base = Math.sin(x * 0.006 + depth * 15 + time * 1.25 + phase) * 15;
                const cross = Math.cos(x * 0.012 - depth * 9 + time * 0.72) * 8;
                const long = Math.sin(depth * 24 - time * 0.92) * 12;
                const cursor = cursorWake(x, depth);
                return (base + cross + long + cursor) * scale * (0.3 + depth * 0.95);
            }

            function cursorWake(x, depth) {
                if (mouse.x == null || mouse.y == null) return 0;
                const p = project(x, depth, 0);
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > mouse.radius) return 0;
                const pull = 1 - dist / mouse.radius;
                return Math.sin(pull * Math.PI) * (isSeaPage ? 58 : 30);
            }

            function cursorPresence(x, y) {
                if (mouse.x == null || mouse.y == null) return 0;
                const dx = x - mouse.x;
                const dy = y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                return Math.max(0, 1 - dist / mouse.radius);
            }

            function createSymbols() {
                const count = Math.min(isSeaPage ? 46 : 24, Math.max(14, Math.floor(width * height / (isSeaPage ? 26000 : 52000))));
                symbols = Array.from({ length: count }, () => ({
                    lane: Math.random(),
                    depth: Math.random(),
                    drift: Math.random() * Math.PI * 2,
                    speed: 0.00045 + Math.random() * 0.001,
                    char: glyphs[Math.floor(Math.random() * glyphs.length)],
                    size: 13 + Math.random() * (isSeaPage ? 13 : 8)
                }));
            }

            function fillAtmosphere() {
                const sky = ctx.createLinearGradient(0, 0, 0, height);
                sky.addColorStop(0, '#f8fcff');
                sky.addColorStop(0.26, isSeaPage ? '#dcebf5' : '#e9f2f8');
                sky.addColorStop(0.58, isSeaPage ? '#b7d1e7' : '#d8e6f1');
                sky.addColorStop(1, isSeaPage ? '#7ea8cb' : '#c9d9e8');
                ctx.fillStyle = sky;
                ctx.fillRect(0, 0, width, height);

                const glow = ctx.createRadialGradient(width * 0.52, height * 0.22, 0, width * 0.52, height * 0.22, Math.max(width, height) * 0.62);
                glow.addColorStop(0, isSeaPage ? 'rgba(255,255,255,0.72)' : 'rgba(255,255,255,0.46)');
                glow.addColorStop(0.42, 'rgba(160,213,224,0.24)');
                glow.addColorStop(1, 'rgba(64,110,157,0)');
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, width, height);

                const veil = ctx.createLinearGradient(0, height * 0.24, 0, height);
                veil.addColorStop(0, 'rgba(255,255,255,0)');
                veil.addColorStop(0.72, isSeaPage ? 'rgba(255,255,255,0.06)' : 'rgba(223,231,240,0.26)');
                veil.addColorStop(1, isSeaPage ? 'rgba(19,70,114,0.18)' : 'rgba(223,231,240,0.38)');
                ctx.fillStyle = veil;
                ctx.fillRect(0, 0, width, height);
            }

            function drawHorizon() {
                const y = height * (isSeaPage ? 0.31 : 0.37);
                const gradient = ctx.createLinearGradient(0, y - 16, 0, y + 34);
                gradient.addColorStop(0, 'rgba(255,255,255,0)');
                gradient.addColorStop(0.45, isSeaPage ? 'rgba(255,255,255,0.62)' : 'rgba(255,255,255,0.28)');
                gradient.addColorStop(1, 'rgba(83,139,178,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, y - 18, width, 58);
            }

            function drawRibbon(depth, alpha, offset) {
                const steps = isSeaPage ? 150 : 110;
                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    const x = (i / steps) * width;
                    const p = project(x, depth, wave(x, depth, offset));
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 1.2 + depth * 2.2;
                ctx.shadowColor = `rgba(111,207,220,${alpha * 0.8})`;
                ctx.shadowBlur = isSeaPage ? 16 : 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            function drawGrid() {
                const depths = [];
                const depthCount = isSeaPage ? 30 : 22;
                for (let i = 0; i < depthCount; i++) depths.push(i / (depthCount - 1));

                depths.forEach((depth, index) => {
                    const alpha = (0.05 + depth * (isSeaPage ? 0.28 : 0.13)) * (index % 4 === 0 ? 1.35 : 1);
                    ctx.beginPath();
                    for (let i = 0; i <= 150; i++) {
                        const x = (i / 150) * width;
                        const p = project(x, depth, wave(x, depth));
                        if (i === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.strokeStyle = `rgba(34,100,153,${alpha})`;
                    ctx.lineWidth = index % 4 === 0 ? 1.2 : 0.8;
                    ctx.stroke();
                });

                const laneCount = isSeaPage ? 21 : 15;
                for (let lane = 0; lane < laneCount; lane++) {
                    const xBase = (lane / (laneCount - 1)) * width;
                    ctx.beginPath();
                    for (let i = 0; i <= 120; i++) {
                        const depth = i / 120;
                        const x = xBase + Math.sin(depth * 8 + time * 0.32 + lane) * 16 * depth;
                        const p = project(x, depth, wave(x, depth, lane * 0.18));
                        if (i === 0) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    const edge = Math.abs(lane / (laneCount - 1) - 0.5);
                    ctx.strokeStyle = `rgba(30,91,143,${(isSeaPage ? 0.2 : 0.1) * (1 - edge * 0.72)})`;
                    ctx.lineWidth = 0.9;
                    ctx.stroke();
                }

                for (let i = 0; i < (isSeaPage ? 7 : 4); i++) {
                    const depth = 0.22 + i * 0.1 + Math.sin(time * 0.16 + i) * 0.012;
                    drawRibbon(depth, (isSeaPage ? 0.2 : 0.08) * (1 - i * 0.07), i * 0.9);
                }
            }

            function drawCaustics() {
                const bands = isSeaPage ? 18 : 9;
                ctx.globalCompositeOperation = 'screen';
                for (let i = 0; i < bands; i++) {
                    const y = height * (0.42 + i * 0.035) + Math.sin(time * 0.58 + i) * 18;
                    const gradient = ctx.createLinearGradient(width * 0.2, y, width * 0.82, y + 24);
                    gradient.addColorStop(0, 'rgba(255,255,255,0)');
                    gradient.addColorStop(0.5, `rgba(210,250,255,${isSeaPage ? 0.08 : 0.035})`);
                    gradient.addColorStop(1, 'rgba(255,255,255,0)');
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 1 + (i % 3);
                    ctx.beginPath();
                    ctx.moveTo(width * 0.12, y);
                    ctx.bezierCurveTo(width * 0.32, y - 34, width * 0.62, y + 48, width * 0.92, y + Math.sin(i) * 22);
                    ctx.stroke();
                }
                ctx.globalCompositeOperation = 'source-over';
            }

            function drawSymbols() {
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                symbols.forEach((symbol) => {
                    symbol.depth += symbol.speed;
                    if (symbol.depth > 1.04) {
                        symbol.depth = -0.04;
                        symbol.lane = Math.random();
                    }
                    const x = symbol.lane * width + Math.sin(time * 0.42 + symbol.drift) * 56 * symbol.depth;
                    const lift = wave(x, symbol.depth, symbol.drift) + 22 * Math.sin(time + symbol.drift);
                    const p = project(x, symbol.depth, lift);
                    const presence = cursorPresence(p.x, p.y);
                    const alpha = (0.06 + symbol.depth * (isSeaPage ? 0.32 : 0.14) + presence * 0.28) * (symbol.depth > 0 ? 1 : 0);
                    ctx.font = `${symbol.size * (0.62 + symbol.depth * 0.78)}px Georgia, serif`;
                    ctx.fillStyle = `rgba(25,77,126,${alpha})`;
                    ctx.shadowColor = `rgba(202,244,255,${alpha})`;
                    ctx.shadowBlur = isSeaPage ? 14 : 4;
                    ctx.fillText(symbol.char, p.x, p.y);
                });
                ctx.shadowBlur = 0;
            }

            function animate() {
                fillAtmosphere();
                drawHorizon();
                drawCaustics();
                drawGrid();
                drawSymbols();

                if (!reducedMotion) {
                    time += isSeaPage ? 0.012 : 0.007;
                    requestAnimationFrame(animate);
                }
            }

            resize();
            animate();
        });

        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters:[
                    {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true}
                ], throwOnError : false
            });
        });
    </script>

    <!-- === Mermaid 矢量图表引擎 === -->
    <script type="module">
        // 引入最新版 Mermaid (ES Module 格式)
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        
        document.addEventListener("DOMContentLoaded", async function() {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'base',
                themeVariables: {
                    fontFamily: '"Georgia", "Times New Roman", serif',
                    primaryColor: 'rgba(47, 120, 183, 0.1)',
                    primaryTextColor: '#223044',
                    primaryBorderColor: '#2f78b7',
                    lineColor: '#238d83',
                    tertiaryColor: 'rgba(121, 99, 177, 0.1)',
                    tertiaryBorderColor: '#7963b1'
                }
            });

            const mermaidBlocks = document.querySelectorAll('code.language-mermaid');
            if (mermaidBlocks.length > 0) {
                mermaidBlocks.forEach((block) => {
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = block.textContent; 
                    block.parentElement.replaceWith(div); 
                });
                
                await mermaid.run({ querySelector: '.mermaid' });
            }
        });
    </script>

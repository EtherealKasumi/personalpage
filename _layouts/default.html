<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- 引入 KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117; --text-color: #c9d1d9; --accent-color: #58a6ff;
            --math-font: "Georgia", "Times New Roman", serif; 
        }
        body, html {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: var(--math-font); line-height: 1.8; overflow-x: hidden;
        }
        #math-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.15; }
        
        /* 导航栏 */
        .top-nav {
            text-align: center; padding: 20px 0; background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .top-nav a { color: var(--text-color); text-decoration: none; margin: 0 15px; font-size: 1.1em; transition: color 0.3s; }
        .top-nav a:hover { color: var(--accent-color); }

        /* 内容容器 (限制宽度并居中) */
        .paper-container {
            max-width: 850px; margin: 40px auto; padding: 50px 60px;
            background: rgba(13, 17, 23, 0.75); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* 主页个人名片专属 CSS */
        .profile-section { display: flex; align-items: center; gap: 40px; margin-bottom: 40px; }
        .profile-avatar { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-color); box-shadow: 0 0 20px rgba(88, 166, 255, 0.3); flex-shrink: 0; }
        .profile-info h1 { margin: 0 0 10px 0; text-align: left; border-bottom: none; font-size: 2.2em; }
        .profile-info .subtitle { margin: 0 0 20px 0; color: #8b949e; font-size: 1.2em; font-style: italic; }
        .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn { display: inline-block; padding: 10px 20px; background: rgba(88, 166, 255, 0.05); color: var(--accent-color); border: 1px solid var(--accent-color); border-radius: 6px; text-decoration: none !important; font-weight: bold; font-family: sans-serif; transition: all 0.3s ease; }
        .btn:hover { background: var(--accent-color); color: #0d1117; box-shadow: 0 0 15px rgba(88, 166, 255, 0.5); transform: translateY(-2px); }
        @media (max-width: 650px) {
            .profile-section { flex-direction: column; text-align: center; }
            .profile-info h1 { text-align: center; }
            .action-buttons { justify-content: center; }
        }

        /* 数学与其他标签样式 */
        .theorem { margin: 2em 0; padding: 15px 20px; background: rgba(88, 166, 255, 0.05); border-left: 4px solid var(--accent-color); }
        .theorem::before { content: "定理 (Theorem). "; font-weight: bold; color: var(--accent-color); }
        .proof { margin: 2em 0; padding: 15px 20px; font-style: italic; }
        .proof::before { content: "证明 (Proof). "; font-weight: bold; font-style: normal; }
        .proof::after { content: "■"; float: right; color: var(--text-color); }
        .definition { margin: 2em 0; padding: 15px 20px; border: 1px dashed rgba(255,255,255,0.3); background: rgba(255,255,255,0.02); }
        .definition::before { content: "定义 (Definition). "; font-weight: bold; }
        .katex-display { overflow-x: auto; overflow-y: hidden; padding: 5px 0; }
        a { color: var(--accent-color); text-decoration: none; }
        img { max-width: 100%; border-radius: 4px; }
        code { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 3px; font-family: monospace; }
    </style>
</head>
<body>

    <!-- 动态数学背景 -->
    <canvas id="math-canvas"></canvas>

    <!-- 顶部导航栏 -->
    <nav class="top-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/cv.html' | relative_url }}">CV</a>
        <a href="{{ '/notes.html' | relative_url }}">Notes</a>
        <a href="{{ '/resources.html' | relative_url }}">Resources</a>
    </nav>

    <!-- !!! 核心区域 !!! 你的 Markdown 内容只会在这里渲染 -->
    <div class="paper-container">
        {{ content }}
    </div>

    <script>
        const canvas = document.getElementById('math-canvas'); const ctx = canvas.getContext('2d');
        let width, height, symbolsArray = []; const mathChars =['∫', '∑', '∏', '∞', 'π', 'θ', 'λ', '∇', '∂', '√', 'Δ'];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class MathSymbol {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.char = mathChars[Math.floor(Math.random() * mathChars.length)]; this.size = Math.random() * 20 + 10; this.speedY = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.5 + 0.2; this.angle = Math.random() * Math.PI * 2; this.amplitude = Math.random() * 1.5; }
            update() { this.y -= this.speedY; this.x += Math.sin(this.angle) * this.amplitude; this.angle += 0.02; if (this.y < -50) { this.y = height + 50; this.x = Math.random() * width; } }
            draw() { ctx.fillStyle = `rgba(136, 166, 204, ${this.opacity})`; ctx.font = `${this.size}px Georgia`; ctx.fillText(this.char, this.x, this.y); }
        }
        for (let i = 0; i < 80; i++) symbolsArray.push(new MathSymbol());
        function animate() { ctx.clearRect(0, 0, width, height); ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1; for(let i=0; i<width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); } for(let i=0; i<height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); } symbolsArray.forEach(sym => { sym.update(); sym.draw(); }); requestAnimationFrame(animate); }
        animate();
        document.addEventListener("DOMContentLoaded", function() { renderMathInElement(document.body, { delimiters:[ {left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}, {left: '\\(', right: '\\)', display: false}, {left: '\\[', right: '\\]', display: true} ], throwOnError : false }); });
    </script>
</body>
</html>
